<div *ngIf="show" class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-container">
    <div class="modal-header">
      <h3>{{ title }}</h3>
      <button class="close-btn" (click)="onClose()" aria-label="Cerrar">×</button>
    </div>

    <div class="modal-body">
      <ng-content></ng-content>
    </div>

    <div *ngIf="showFooter" class="modal-footer">
      <app-button
        [label]="cancelLabel"
        variant="secondary"
        (clicked)="onClose()">
      </app-button>
      <app-button
        [label]="confirmLabel"
        [variant]="confirmVariant"
        (clicked)="onConfirm()">
      </app-button>
    </div>
  </div>
</div>
